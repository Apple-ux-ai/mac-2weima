<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Details</title>
  <script src="./i18n/core.js"></script>
  <link rel="stylesheet" href="./rtl.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      flex: 1;
      word-break: break-word;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      font-size: 1.5rem;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.3s;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .close-btn:hover {
      background: #f5f5f5;
      color: #333;
    }

    .content {
      flex: 1;
      padding: 20px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .main-question {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .question-label {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.1rem;
      color: #333;
      font-weight: 600;
      line-height: 1.6;
      word-break: break-word;
    }

    .data-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
    }

    .data-item {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
    }

    .data-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .data-label {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .data-value {
      font-size: 1.1rem;
      color: #333;
      line-height: 1.6;
      word-break: break-word;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .error {
      text-align: center;
      padding: 60px 20px;
      color: #f44336;
    }

    .footer {
      padding: 20px;
      text-align: center;
      border-top: 1px solid #e0e0e0;
      background: white;
      color: #999;
      font-size: 0.85rem;
      margin-top: auto;
    }

    .footer-link {
      color: #2196F3;
      text-decoration: none;
    }

    .footer-link:hover {
      text-decoration: underline;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .question-text {
      text-align: left;
    }

    @media (max-width: 768px) {
      .header {
        padding: 12px 16px;
      }

      .header-title {
        font-size: 1rem;
      }

      .content {
        padding: 16px;
      }

      .data-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title" id="pageTitle">Details</div>
    <button class="close-btn" onclick="closePage()">✕</button>
  </div>

  <div class="content">
    <div id="loading" class="loading">Loading data...</div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="dataContent" style="display: none;"></div>
  </div>

  <div class="footer" id="footerLine">This page is generated by QR Generator</div>

  <script>
    const t = (key, params, fallback) => window.PublicI18n?.t(key, params, fallback) || fallback || key
    document.title = t('livecode.title', null, 'Details')
    window.addEventListener('DOMContentLoaded', () => {
      const loading = document.getElementById('loading')
      if (loading) loading.textContent = t('livecode.loading', null, 'Loading data...')
      const footer = document.getElementById('footerLine')
      if (footer) footer.textContent = t('livecode.footer', null, 'This page is generated by QR Generator')
    })

    function getLiveCodeIdFromUrl() {
      const hash = window.location.hash
      const match = hash.match(/\/livecode\/(.+)/)
      return match ? match[1] : null
    }

    function closePage() {
      if (window.history.length > 1) {
        window.history.back()
      } else {
        window.close()
      }
    }

    // 从IndexedDB读取文件
    async function getFileFromIndexedDB(id) {
      return new Promise((resolve, reject) => {
        if (!('indexedDB' in window)) {
          resolve(null)
          return
        }
        
        const request = indexedDB.open('QRCodeStorage', 1)
        
        request.onerror = () => {
          console.warn('IndexedDB打开失败:', request.error)
          resolve(null)
        }
        
        request.onsuccess = () => {
          const db = request.result
          const transaction = db.transaction(['files'], 'readonly')
          const store = transaction.objectStore('files')
          const getRequest = store.get(id)
          
          getRequest.onsuccess = () => {
            if (getRequest.result) {
              console.log('✓ 从IndexedDB获取活码数据成功:', id)
              resolve(getRequest.result.data)
            } else {
              resolve(null)
            }
          }
          
          getRequest.onerror = () => {
            console.warn('IndexedDB读取失败:', getRequest.error)
            resolve(null)
          }
        }
        
        request.onupgradeneeded = (event) => {
          const db = event.target.result
          if (!db.objectStoreNames.contains('files')) {
            db.createObjectStore('files', { keyPath: 'id' })
          }
        }
      })
    }

    async function loadLiveCodeData() {
      const liveCodeId = getLiveCodeIdFromUrl()
      
      if (!liveCodeId) {
        showError('无效的活码ID')
        return
      }

      try {
        let data = null
        
        // 步骤1: 从localStorage读取
        const dataStr = localStorage.getItem(liveCodeId)
        if (dataStr) {
          try {
            const parsed = JSON.parse(dataStr)
            // 检查是否是IndexedDB标记
            if (parsed._indexedDB === true) {
              // 数据存储在IndexedDB中，从IndexedDB读取
              console.log('检测到IndexedDB标记，从IndexedDB读取:', liveCodeId)
              data = await getFileFromIndexedDB(liveCodeId)
            } else {
              // 直接是数据内容
              data = parsed
            }
          } catch (parseError) {
            console.error('解析localStorage数据失败:', parseError)
          }
        }
        
        // 步骤2: 如果localStorage没有，尝试从IndexedDB读取
        if (!data) {
          data = await getFileFromIndexedDB(liveCodeId)
        }
        
        if (!data) {
          showError('数据未找到或已过期')
          return
        }
        
        console.log('加载的活码数据:', data)
        
        // 显示页面标题（优先使用行号，其次使用二维码列的内容，最后使用默认标题）
        let pageTitle = '信息详情'
        if (data.title) {
          pageTitle = data.title
        } else if (data.rowIndex) {
          pageTitle = `数据行${data.rowIndex}`
        } else if (data.data && data.qrColumn && data.data[data.qrColumn]) {
          pageTitle = data.data[data.qrColumn]
        }
        
        document.getElementById('pageTitle').textContent = pageTitle
        
        // 显示数据
        renderData(data)
        
        document.getElementById('loading').style.display = 'none'
        document.getElementById('dataContent').style.display = 'block'
        
      } catch (error) {
        console.error('加载数据失败:', error)
        showError('数据加载失败：' + error.message)
      }
    }

    function renderData(data) {
      const container = document.getElementById('dataContent')
      
      console.log('渲染数据:', data)
      
      // 检查是否有有效数据
      if (!data || !data.data || !data.columns || !Array.isArray(data.columns) || data.columns.length === 0) {
        console.log('数据无效，显示暂无内容')
        container.innerHTML = '<div class="main-question"><div class="question-text" style="text-align: center;">暂无内容</div></div>'
        return
      }
      
      // 检查数据是否为空对象或所有值都为空
      const hasData = data.columns.some(col => {
        const value = data.data[col]
        return value !== null && value !== undefined && value !== '' && String(value).trim() !== ''
      })
      
      console.log('是否有数据:', hasData, '数据内容:', data.data)
      
      if (!hasData) {
        console.log('数据为空，显示暂无内容')
        container.innerHTML = '<div class="main-question"><div class="question-text" style="text-align: center;">暂无内容</div></div>'
        return
      }

      let html = ''
      
      const qrColumn = data.qrColumn
      const qrValue = (data.data && qrColumn) ? String(data.data[qrColumn] || '').trim() : ''
      
      // 显示主问题框（灰色背景框）
      // 根据图片：第一个字段的值作为标签，二维码列的值作为主问题文本
      const firstColumn = data.columns[0]
      const firstValue = (firstColumn && data.data && data.data[firstColumn]) ? String(data.data[firstColumn]).trim() : ''
      
      html += '<div class="main-question">'
      
      // 如果第一个字段存在且不是二维码列，且有值，显示第一个字段的值作为标签
      if (firstColumn && firstColumn !== qrColumn && firstValue) {
        html += `<div class="question-label">${firstValue}:</div>`
      }
      
      // 主问题文本使用二维码列的值，如果没有则使用第一个字段的值
      const mainQuestionText = qrValue || firstValue || '暂无内容'
      html += `<div class="question-text">${mainQuestionText}</div>`
      html += '</div>'

      // 显示其他字段的数据（如果有）
      const otherColumns = data.columns.filter(col => {
        if (col === qrColumn) return false
        if (!data.data || !data.data[col]) return false
        const value = String(data.data[col]).trim()
        return value !== ''
      })
      
      if (otherColumns.length > 0) {
        html += '<div class="data-card">'
        
        otherColumns.forEach(column => {
          const fieldConfig = data.fieldConfig
          const fontSize = fieldConfig?.fontSize || 14
          const fontWeight = fieldConfig?.fontWeight === '加粗' ? 'bold' : 'normal'
          const color = fieldConfig?.color || '#333'
          const align = fieldConfig?.align === '居中' ? 'center' : 
                       fieldConfig?.align === '右对齐' ? 'right' : 'left'
          
          html += `
            <div class="data-item">
              <div class="data-label">${column}</div>
              <div class="data-value" style="font-size: ${fontSize}px; font-weight: ${fontWeight}; color: ${color}; text-align: ${align};">${data.data[column]}</div>
            </div>
          `
        })
        
        html += '</div>'
      }
      
      container.innerHTML = html || '<div class="main-question"><div class="question-text" style="text-align: center;">暂无内容</div></div>'
    }

    function showError(message) {
      document.getElementById('loading').style.display = 'none'
      document.getElementById('error').style.display = 'block'
      document.getElementById('error').textContent = message
    }

    // 页面加载时执行
    window.addEventListener('load', loadLiveCodeData)
    window.addEventListener('hashchange', loadLiveCodeData)
  </script>
</body>
</html>
